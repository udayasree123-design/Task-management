<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    h1{
        color:#0d6efd;
        margin-left: 600px;
        margin-top:100px;
        margin-bottom: -20px;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        
    }
    #box{
        width:450px;
        height: 200px;
        border:4px solid #0d6efd;
        border-radius: 10px;
        padding: 30px;
        margin: 50px auto;
        background-color: rgb(211 211 250);
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

    }
    button{
    background-color: #0d6efd;
    color: white;
    width: 80px;
    height: 30px;
    border-radius: 10px;
    margin-top: 30px;
    }
    span{
        color:black;
        font-weight: bold;
    }
    input{
        width:300px;
    }
</style>
<body>
<h1>Edit Task</h1>
<div id="box">
<form method="POST">
    {% csrf_token %}
    <span>TASK: </span><input type="text" name="name" value="{{ task.name }}">
    <br><br><br>
    <span>DESCRIPTION: </span><input type="text" name="desc" value="{{ task.desc }}">
    <br><br>
    <button type="submit">Update</button>
</form>
</div>
</body>
</html>
