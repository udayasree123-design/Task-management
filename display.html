<!DOCTYPE html>
<html>
<head>
    <title>document</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        nav{
            background:#0d6efd;
            display:flex;
            justify-content:space-evenly;
            align-items:center;
            padding:15px 30px;
        }
        .logo{
            color:white;
            font-size:22px;
            font-weight:bold;
        }

        .menu{
            display:flex;
            gap:200px;
            align-items:center;
        }

        .menu a{
            color:white;
            text-decoration:none;
            font-size:25px;
            gap:200px;
        }
        nav.menu a{
            text-decoration:none;
            color:white;
            font-size:80px;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        .menu a:hover{
            color:rgb(239, 243, 11);
        }
        .content{
            text-align:center;
            margin-top:50px;
        }
         h2{
            color:#0d6efd;
            margin-bottom:10px;
            margin-top:60px;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        .content{
            width:700px;
            height:400px;
            border:4px solid #0d6efd;
            margin:50px auto;
            border-radius:10px;
            padding:20px;
            background-color: rgb(211, 211, 250);
        }
        button{
            padding:10px 20px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-right:20px;
        }
        img{
            width:40px;
            height:40px;
            border-radius:50%;
        }
        #desc{
            width:150px;
            height: 40px;
        }
        a{
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        h3{
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        span{
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
<nav>
    <div class="menu">
        <a href="{% url 'reg' %}">Home</a>
        <a href="{% url 'list_of_tasks' %}">List</a>
        <a href="{% url 'history' %}">History</a>
        <a href="{% url 'logout' %}">Logout</a>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="User">
    </div>
</nav>
<div class="content">
    <h2>Welcome to your dashboard!</h2>
    <h3>This is a protected page that only authenticated users can access.</h3>
    <br>
    <form action="{% url 'display' %}" method="post">
        {% csrf_token %}
        <span>TASK:</span><input type="text" name="name" value="{{data.name}}" id="">
        <br><br>
        <span>DESCRIPTION:</span> <input type="text" name="desc" value="{{data.desc}}" id="desc">
        <br><br><br><br>
        <button type="submit">SUBMIT</button>
        <button type="button" onclick="window.location.href='{% url 'list_of_tasks' %}'">LIST</button>
    </form>
</div>
</body>
</html>
