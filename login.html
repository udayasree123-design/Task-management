<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
        }
        body{
            background:#f4f6f9;
        }
        nav{
            background:#0d6efd;
            width:100%vw;
            height:60px;
            display:flex;
            justify-content:space-evenly;
            align-items:center;
            color:white;
        }

        nav ul{
            list-style:none;
            display:flex;
            gap:300px;
        }

        nav ul div a{
            text-decoration:none;
            color: white;
            font-size:25px;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            
        }

        nav ul div a:hover{
            color:#ffd700;
        }
        .hero{
            width:800px;
            height:400px;
            border:4px solid #0d6efd;
            margin:50px auto;
            border-radius:10px;
            text-align:center;
            padding:50px 20px; 
            background-color: rgb(211 211 250);
        }
        form{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:20px;
        }
        button{
            padding:10px 20px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        h2{
            margin-bottom:40px;
        }

</style>
<body>
    <nav>
        <ul>
            <div><a href="{% url 'reg' %}">HOME</a></div>
            <div><a href="{% url 'reg' %}">REGISTER</a></div>
            <div><a href="{% url 'list_of_tasks' %}">LIST</a></div>
        </ul>
    </nav>
    <div class="hero">
        <h2>Welcome to our website! Please log in to access your account.</h2>
        <form action="" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="button" onclick="window.location.href='{% url 'display' %}'">LOGIN</button>
        </form>
    </div>
</body>
</html>
