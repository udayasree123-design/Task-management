<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div{
        width: 600px;
        height: 100%vh;
        border: 4px solid #0d6efd;
        margin:50px auto;
        border-radius: 10px;
        padding: 20px;
        background-color: rgb(211, 211, 250);
    }
    h3{
        color: #0d6efd;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }
    h2{
        color: #0d6efd;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        margin-left: 530px;
        margin-bottom: -20px;
    }
    p{
        color:black;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

    }
    span{
        color:darkred;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

    }
</style>
<body>
    <h2>Deleted Tasks History</h2>
    <!-- <table border="1">
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Deleted At</th>
        </tr>
        {% for record in records %}
        <tr>
            <td>{{ record.name }}</td>
            <td>{{ record.desc }}</td>
            <td>{{ record.deleted_at }}</td>
        </tr>
        {% endfor %} 
    </table>  -->
    <div>
        {% for i in data %}
        <h3>{{ i.name }}</h3>
        <p>{{ i.desc }}</p>
        <span>{{ i.deleted_at }}</span>
        <hr>
        {% empty %}
        <h2>No deleted records found</h2>
        {% endfor %}
    </div>
    
</body>
</html>
