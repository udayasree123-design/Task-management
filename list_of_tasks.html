<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .task-item{
    padding:15px;
    margin-bottom:15px;
    background:#f8f9fa;
    border-radius:10%;
}

.task-item h3{
    margin-bottom:10px;
}
h1{
    color: #0d6efd;
    margin-left: 600px;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
}
button{
    background-color: #0d6efd;
    color: white;
    width: 80px;
    height: 30px;
    border-radius: 10px;
    }
    span{
        color:black;
        font-weight: bold;
    }
    #span1{
        font-weight: normal;
    }
    div{
        border:4px solid #0d6efd ; 
        padding:15px; 
        margin-left:370px; 
        border-radius: 10px; 
        width:600px; 
        margin-bottom: 10px;
        background-color: rgb(211 211 250);
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;

    }
</style>
<body>
    <h1>List of Tasks</h1>
    {% for i in data %}
    <div>
        <span>TASK: </span><span id="span1">{{ i.name }}</span>
        <br><br>
        <span>DESCRIPTION: </span><span id="span1">{{ i.desc }}</span>
        <br><br>
        <a href="{% url 'edit' i.id %}"><button>Edit</button></a>
        <a href="{% url 'delete' i.id %}"><button>Delete</button></a>
    </div>
    {% endfor %}
    <br><br>
    <button type="button" onclick="window.location.href='{% url 'history' %}'" style="margin-left: 630px;">History</button>


</body>
</html>
